<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Luxury NFT Marketplace</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #fff;
      margin: 0;
    }

    header {
      padding: 20px;
      text-align: center;
      background: #1e293b;
      font-size: 24px;
      font-weight: bold;
    }

    .controls {
      padding: 20px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    input, select, button {
      padding: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      background: #6366f1;
      color: white;
      cursor: pointer;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: #1e293b;
      border-radius: 12px;
      padding: 15px;
    }

    img {
      width: 100%;
      border-radius: 8px;
    }

    .btns {
      display: flex;
      gap: 5px;
      margin-top: 10px;
    }

    .btns button {
      flex: 1;
    }
  </style>
</head>

<body>

<header>Luxury NFT Marketplace</header>

<div class="controls">
  <input id="search" placeholder="Search bag..." />
  <select id="condition">
    <option value="">All Conditions</option>
    <option>New</option>
    <option>Used</option>
  </select>
  <select id="material">
    <option value="">All Materials</option>
    <option>Leather</option>
    <option>Canvas</option>
  </select>
  <button onclick="applyFilters()">Filter</button>
  <button onclick="loadCatalog()">Refresh</button>
</div>

<div id="grid" class="grid"></div>

<script>
let items = [];

async function loadCatalog() {
  const res = await fetch("/catalog");
  const data = await res.json();
  items = data.items || [];
  render(items);
}

function render(list) {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  list.forEach(item => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${item.imageURI || 'https://via.placeholder.com/300'}" />
      <h3>${item.bagName}</h3>
      <p>ID: ${item.tokenId}</p>
      <p>Condition: ${item.condition}</p>
      <p>Material: ${item.material}</p>
      <p>Owner: ${item.owner}</p>

      <div class="btns">
        <button onclick="buy(${item.tokenId})">Buy</button>
        <button onclick="sell(${item.tokenId})">Sell</button>
        <button onclick="transfer(${item.tokenId})">Transfer</button>
      </div>
    `;

    grid.appendChild(card);
  });
}

function applyFilters() {
  const s = document.getElementById("search").value.toLowerCase();
  const c = document.getElementById("condition").value;
  const m = document.getElementById("material").value;

  const filtered = items.filter(i =>
    i.bagName.toLowerCase().includes(s) &&
    (!c || i.condition === c) &&
    (!m || i.material === m)
  );

  render(filtered);
}

function buy(id) {
  alert("Buy NFT " + id + " (connect to smart contract later)");
}

function sell(id) {
  alert("Sell NFT " + id);
}

function transfer(id) {
  const to = prompt("Enter address:");
  alert(`Transfer ${id} → ${to}`);
}

loadCatalog();
</script>

</body>
</html>
