<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Luxury Passport NFT Marketplace</title>
  <link rel="stylesheet" href="styles.css" />
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body class="market-body">
      <header class="campaign-topbar">
    <div class="campaign-mini-brand" a href="index.html">#BAG</div>

    <nav class="campaign-nav">
      <a href="index.html">HOME</a>
      <a href="marketplace.html" class="active">BROWSE</a>
      <a href="mint.html">SELL</a>
      <a href="wallet-activity.html">WALLETS</a>
      <a href="rewards.html">REWARDS</a>

      <div class="nav-icons">
      <i class='bx bx-user' id="accountIcon"></i>
      <i class='bx bx-shopping-bag' id="cartIcon"></i>
    </div>
    </nav>

  </header>
<div class="page-frame">
    <section class="market-hero">
      <h1 class="page-title">GALLERY</h1>

      <div class="market-controls">
        <input id="search" type="text" placeholder="Search bags..." />
        <select id="conditionFilter">
          <option value="">All Conditions</option>
          <option value="Excellent">Excellent</option>
          <option value="Good">Good</option>
          <option value="Fair">Fair</option>
          <option value="Used">Used</option>
          <option value="New">New</option>
        </select>

        <select id="materialFilter">
          <option value="">All Materials</option>
          <option value="Leather">Leather</option>
          <option value="Canvas">Canvas</option>
          <option value="Lambskin">Lambskin</option>
          <option value="Caviar">Caviar</option>
          <option value="Suede">Suede</option>
        </select>

        <button id="refreshBtn" class="ghost-btn">Refresh</button>
      </div>
    </section>

    <section>
      <div id="marketGrid" class="gallery-grid"></div>
      <div id="emptyState" class="empty-state" style="display:none;">
        No NFTs found.
      </div>
    </section>
  </div>
<script src="marketplace.js"></script>
<script src="header.js"></script>
</body>
</html>
