<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body class="gallery-page">
  <header class="gallery-topbar">
    <div class="gallery-mini-brand">#BAG</div>
    <nav class="gallery-nav">
      <a href="index.html">HOME</a>
      <a href="marketplace.html">BROWSE</a>
      <a href="mint.html">SELL</a>
      <a href="signin.html">SIGN IN</a>
      <div class="nav-icons">
      <i class='bx bx-user' id="accountIcon"></i>
      <i class='bx bx-shopping-bag' id="cartIcon"></i>
    </div>
    </nav>
  </header>

  <main class="auth-shell">
    <section class="auth-banner">
      <h1>CREATE ACCOUNT</h1>
    </section>

    <section class="auth-card">
      <div class="auth-kicker">Join #BAG</div>
      <p class="auth-copy">Create an account to save favorites, buy, sell, and track orders.</p>

      <form class="auth-form" onsubmit="handleCreateAccount(event)">
        <label class="auth-label" for="fullName">Full name</label>
        <input id="fullName" class="auth-input" type="text" placeholder="Your name" required />

        <label class="auth-label" for="createEmail">Email</label>
        <input id="createEmail" class="auth-input" type="email" placeholder="you@example.com" required />

        <label class="auth-label" for="createPassword">Password</label>
        <input id="createPassword" class="auth-input" type="password" placeholder="Create password" required />

        <label class="auth-label" for="wallet">Wallet address</label>
        <input id="wallet" class="auth-input" type="text" placeholder="Optional for Web3 checkout" />

        <button class="auth-btn" type="submit">Create Account</button>
      </form>

      <div class="auth-status" id="createStatus"></div>

      <div class="auth-links">
        <span>Already have an account?</span>
        <a href="signin.html">Sign in</a>
      </div>
    </section>
  </main>

  <script>
    function handleCreateAccount(event) {
      event.preventDefault();
      const box = document.getElementById("createStatus");
      box.className = "auth-status show";
      box.textContent = "Demo account created. Hook this to your backend later.";
    }
  </script>
</body>
</html>
