<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In</title>
  <link rel="stylesheet" href="styles.css" />
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
   <header class="campaign-topbar">
    <div class="campaign-mini-brand" a href="index.html">#BAG</div>

    <nav class="campaign-nav">
      <a href="index.html">HOME</a>
      <a href="marketplace.html">BROWSE</a>
      <a href="mint.html">SELL</a>

      <div class="nav-icons">
      <i class='bx bx-user' id="accountIcon"></i>
      <i class='bx bx-shopping-bag' id="cartIcon"></i>
    </div>
    </nav>

  </header>

<main class="page-frame">
  <h1 class="page-title">SIGN IN</h1>
  <p class="page-intro">
    Sign in to manage your cart, purchases, and listings.
  </p>

  <section class="editorial-card auth-card">
      <form class="auth-form" onsubmit="handleSignIn(event)">
        <label class="form-label" for="email">Email</label>
        <input id="email" class="form-input" type="email" placeholder="you@example.com" required />

        <label class="form-label" for="password">Password</label>
        <input id="password" class="form-input" type="password" placeholder="••••••••" required />

        <button class="primary-pill-btn" type="submit">Sign In</button>
      </form>

      <div class="auth-status" id="signinStatus"></div>

      <div class="auth-links">
        <span>New here?</span>
        <a href="create-account.html">Create account</a>
      </div>
    </section>
  </main>

  <script>
    function handleSignIn(event) {
      event.preventDefault();
      const box = document.getElementById("signinStatus");
      box.className = "auth-status show";
      box.textContent = "Demo sign-in complete. Connect this to your backend later.";
    }
  </script>
  <script src="header.js"></script>
</body>
</html>
