<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NFT Details</title>
  <link rel="stylesheet" href="styles.css" />
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body class="item-body">
 
    <header class="campaign-topbar">
    <div class="campaign-mini-brand" a href="index.html">#BAG</div>

    <nav class="campaign-nav">
      <a href="index.html">HOME</a>
      <a href="marketplace.html">BROWSE</a>
      <a href="mint.html">SELL</a>
      <a href="wallet-activity.html">WALLETS</a>

      <div class="nav-icons">
      <i class='bx bx-user' id="accountIcon"></i>
      <i class='bx bx-shopping-bag' id="cartIcon"></i>
    </div>
    </nav>

  </header>

  <main class="page-frame">
    <div class="item-layout">
      <section class="item-image-wrap editorial-card">
        <img
          id="itemImage"
          alt="NFT item"
        />
      </section>

      <section class="editorial-card item-info">
        <div class="item-kicker">VERIFIED LUXURY ITEM</div>
        <h1 id="itemName" class="item-name">Loading...</h1>
        <p id="itemIntro" class="page-intro">
          A digital passport view for your NFT-backed luxury item.
        </p>

        <div class="item-meta-list">
          <div class="item-meta-row"><strong>Token ID</strong><span id="metaTokenId">-</span></div>
          <div class="item-meta-row"><strong>Condition</strong><span id="metaCondition">-</span></div>
          <div class="item-meta-row"><strong>Material</strong><span id="metaMaterial">-</span></div>
          <div class="item-meta-row"><strong>Dash TXID</strong><span id="metaDashTxId">-</span></div>
          <div class="item-meta-row"><strong>Owner</strong><span id="metaOwner">-</span></div>
        </div>

        <div class="mint-divider"></div>
        <h2 style="margin: 0 0 10px; font-size: 1.4rem;">Listing & Bids</h2>
        <div class="item-meta-list">
          <div class="item-meta-row"><strong>Mode</strong><span id="listingModeText">-</span></div>
          <div class="item-meta-row"><strong>Price / Start Bid</strong><span id="listingPriceText">-</span></div>
          <div class="item-meta-row"><strong>Highest Bid</strong><span id="highestBidText">-</span></div>
          <div class="item-meta-row"><strong>Listing Ends</strong><span id="listingEndText">-</span></div>
        </div>

        <div id="bidPanel" style="display: none; margin-top: 14px;">
          <label class="form-label" for="bidWalletId">BIDDER WALLET ID</label>
          <input class="form-input" id="bidWalletId" placeholder="Wallet ID" />

          <label class="form-label" for="bidAmountDash">BID AMOUNT (DASH)</label>
          <input class="form-input" id="bidAmountDash" type="number" min="0" step="0.00000001" placeholder="e.g. 1.75" />

          <button id="placeBidBtn" type="button" class="secondary-pill-btn">PLACE BID</button>
          <div id="bidStatus" class="status-box"></div>
        </div>

        <div class="item-actions">
          <a href="index.html" class="hero-btn">BACK TO MARKETPLACE</a>
        </div>
      </section>
    </div>
  </main>

  <script src="item.js"></script>
  <script src="header.js"></script>
</body>
</html>
